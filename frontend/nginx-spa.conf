# Production static serving for the built SPA (used by the `prod` image stage).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Hashed assets are immutable and safe to cache aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback; never cache the entry document so deploys take effect at once.
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
