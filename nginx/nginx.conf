# Maps the Upgrade header so WebSocket connections (Vite HMR) pass through.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Don't cache the SPA entry document so deploys take effect instantly.
    location = /index.html {
        proxy_pass http://frontend:5173;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # JSON API → FastAPI backend.
    location /api/ {
        client_max_body_size 20m;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else → Vite dev server (with WebSocket upgrade for HMR).
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }
}
