[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"
# Alembic migration scripts are autogenerated; don't lint their formatting.
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
# Seed contains long human-readable template prose inside string literals.
"app/seed.py" = ["E501"]
# Email HTML lives in string literals with long inline-CSS lines.
"app/services/email_templates.py" = ["E501"]
